<h1>Códigos de trapaça de Grand Theft Auto: Vice City</h1>

<div *ngFor="let cheat of cheats">

  <h2>{{ cheat.title }}</h2>
  <h4>{{ cheat.description }}</h4>

  <div class="image-container">
    <img 
      *ngFor="let button of cheat.sequence"
      [src]="buttons[button]"
      width="80">
  </div>

</div>
